<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AidFleet - Request History</title>
  <link rel="stylesheet" href="../css/style.css">
  
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>
  <div class="app-layout" id="app"></div>
  <script>
    // Initialize routing base
    window.APP_ROOT = "../";
  </script>
  <script src="../js/data.js"></script>
  <script>
    (async () => {
      const user = await requireAuth(['requester']);
      if (!user) return;

      const listRes = await apiFetch(window.APP_ROOT + 'api/request/list.php');
      const myRequests = (listRes && listRes.requests) ? listRes.requests : [];

      let cards = '';
      if (myRequests.length === 0) {
        cards = '<div class="card card-padded text-center" style="padding:48px;"><p class="text-muted">No emergency requests found</p></div>';
      } else {
        myRequests.forEach(req => {
          const ratingGiven = req.rating_by_requester ? '<span style="color:#fbbf24;font-size:12px;margin-left:8px;">★ ' + escapeHtml(req.rating_by_requester) + ' (Your rating)</span>' : '';
          const ratingReceived = req.rating_by_driver ? '<span style="color:#3b82f6;font-size:12px;margin-left:8px;">★ ' + escapeHtml(req.rating_by_driver) + ' (Driver rated you)</span>' : '';
          const commentGiven = req.comment_by_requester ? '<p class="text-sm text-muted mt-2" style="font-style:italic;"><span class="material-symbols-outlined inline-icon">chat</span> Your comment: "' + escapeHtml(req.comment_by_requester) + '"</p>' : '';
          const commentReceived = req.comment_by_driver ? '<p class="text-sm mt-2" style="font-style:italic;color:#3b82f6;"><span class="material-symbols-outlined inline-icon">chat</span> Driver\'s comment: "' + escapeHtml(req.comment_by_driver) + '"</p>' : '';

          let driverLine = '';
          if (req.driver_name || req.driver_phone) {
            driverLine = '<p class="text-sm mt-2">' +
              (req.driver_name ? 'Driver: <strong>' + escapeHtml(req.driver_name) + '</strong>' : 'Driver contact') +
              (req.driver_phone ? (req.driver_name ? ' &hyphen; ' : ': ') + '<span class="material-symbols-outlined inline-icon">phone</span> ' + escapeHtml(req.driver_phone) : '') +
              '</p>';
          }

          const hospitalLine = req.hospital_name
            ? '<p class="text-sm mt-1" style="color:var(--info);"><span class="material-symbols-outlined inline-icon">apartment</span> <strong>Hospital:</strong> ' + escapeHtml(req.hospital_name) + '</p>'
            : '';

          cards += '<div class="card card-padded">' +
            '<div class="flex-between">' +
              '<div><div class="flex-row gap-2"><h3 class="font-bold">' + escapeHtml(req.emergency_type || 'Emergency') + '</h3> ' + getStatusBadge(req.request_status) + '</div>' +
              '<p class="text-sm text-muted mt-1">' + escapeHtml(req.description || '') + '</p></div>' +
            '</div>' +
            '<div class="flex-row gap-3 mt-2" style="flex-wrap:wrap;">' + ratingGiven + ratingReceived + '</div>' +
            commentGiven +
            commentReceived +
            '<div class="flex-row gap-4 mt-3 text-xs text-muted">' +
              '<span><span class="material-symbols-outlined inline-icon">location_on</span> ' + escapeHtml(req.location || '') + '</span>' +
              '<span><span class="material-symbols-outlined inline-icon">schedule</span> ' + new Date(req.request_time).toLocaleString() + '</span>' +
            '</div>' +
            driverLine +
            hospitalLine +
          '</div>';
        });
      }

      document.getElementById('app').innerHTML =
        renderSidebar('requester', 'history.html') +
        '<div class="main-area">' + renderTopbar([]) +
        '<div class="content"><div class="space-y-6">' +
          '<div><h1 class="page-title">Request History</h1><p class="page-subtitle">View all your past emergency requests</p></div>' +
          '<div class="space-y-3">' + cards + '</div>' +
        '</div></div></div>';
    })();
  </script>
</body>
</html>
