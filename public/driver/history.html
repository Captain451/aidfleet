<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AidFleet - Dispatch History</title>
  <link rel="stylesheet" href="../css/style.css">
  
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>
  <div class="app-layout" id="app"></div>
  <script>
    // Initialize routing base
    window.APP_ROOT = "../";
  </script>
  <script src="../js/data.js"></script>
  <script>
    (async () => {
      const user = await requireAuth(['driver']);
      if (!user) return;

      const res = await apiFetch(window.APP_ROOT + 'api/driver/history.php');
      const trips = (res && res.history) ? res.history : [];

      let cards = '';
      if (trips.length === 0) {
        cards = '<div class="card card-padded text-center" style="padding:48px;"><p class="text-muted">No completed or past dispatches found.</p></div>';
      } else {
        trips.forEach(t => {
          const started = new Date(t.dispatch_time).toLocaleString();
          const completed = t.completion_time ? new Date(t.completion_time).toLocaleString() : '—';
          const ratingGiven = t.rating_by_driver ? '<span style="color:#fbbf24;font-size:12px;margin-left:8px;">★ ' + escapeHtml(t.rating_by_driver) + ' (Your rating)</span>' : '';
          const ratingReceived = t.rating_by_requester ? '<span style="color:#3b82f6;font-size:12px;margin-left:8px;">★ ' + escapeHtml(t.rating_by_requester) + ' (Requester rated you)</span>' : '';
          const commentGiven = t.comment_by_driver ? '<p class="text-sm text-muted mt-2" style="font-style:italic;"><span class="material-symbols-outlined inline-icon">chat</span> Your comment: "' + escapeHtml(t.comment_by_driver) + '"</p>' : '';
          const commentReceived = t.comment_by_requester ? '<p class="text-sm mt-2" style="font-style:italic;color:#3b82f6;"><span class="material-symbols-outlined inline-icon">chat</span> Requester\'s comment: "' + escapeHtml(t.comment_by_requester) + '"</p>' : '';
          const hospitalLine = t.hospital_name
            ? '<p class="text-sm mt-1" style="color:var(--info);"><span class="material-symbols-outlined inline-icon">apartment</span> <strong>Hospital:</strong> ' + escapeHtml(t.hospital_name) + '</p>'
            : '';

          const requesterLine = (t.requester_name || t.requester_phone)
            ? '<div class="flex-row gap-4 mt-3 text-xs text-muted">' +
              '<span><span class="material-symbols-outlined inline-icon">person</span> ' +
              escapeHtml(t.requester_name || 'Requester') +
              (t.requester_phone ? ' &hyphen; <span class="material-symbols-outlined inline-icon">phone</span> ' + escapeHtml(t.requester_phone) : '') +
              '</span>' +
              '<span>Start: ' + started + '</span>' +
              '<span>Completed: ' + completed + '</span>' +
            '</div>'
            : '<div class="flex-row gap-4 mt-3 text-xs text-muted">' +
              '<span>Start: ' + started + '</span>' +
              '<span>Completed: ' + completed + '</span>' +
            '</div>';

          cards += '<div class="card card-padded">' +
            '<div class="flex-between">' +
              '<div><div class="flex-row gap-2"><h3 class="font-bold">' + escapeHtml(t.emergency_type || 'Emergency') + '</h3> ' + getStatusBadge(t.request_status) + '</div>' +
              '<p class="text-sm text-muted mt-1"><span class="material-symbols-outlined inline-icon">location_on</span> ' + escapeHtml(t.location || '') + '</p>' +
              hospitalLine +
              '</div>' +
            '</div>' +
            '<div class="flex-row gap-3 mt-2" style="flex-wrap:wrap;">' + ratingGiven + ratingReceived + '</div>' +
            commentGiven +
            commentReceived +
            requesterLine +
          '</div>';
        });
      }

      document.getElementById('app').innerHTML =
        renderSidebar('driver', 'history.html') +
        '<div class="main-area">' + renderTopbar([]) +
        '<div class="content"><div class="space-y-6">' +
          '<div><h1 class="page-title">Dispatch History</h1><p class="page-subtitle">View dispatches you have handled</p></div>' +
          '<div class="space-y-3">' + cards + '</div>' +
        '</div></div></div>';
    })();
  </script>
</body>
</html>
