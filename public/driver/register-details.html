<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AidFleet - Driver Details</title>
  <link rel="stylesheet" href="../css/style.css">
  
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>
  <div class="auth-bg">
    <div class="auth-bg-image" style="background-image:url('../images/hero-bg.jpg');"></div>
    <div class="auth-bg-overlay"></div>
    
    <!-- Glass card (wider for more fields) -->
    <div class="glass-card glass-card-wide">
      <div class="glass-logo">
        <img src="../images/aidfleet-logo.png" alt="AidFleet" class="glass-logo-img">
        <h1>AidFleet</h1>
      </div>

      <!-- Step Indicator -->
      <div class="step-indicator" style="display:flex; justify-content:center; gap:12px; margin-bottom:20px;">
        <div class="step-dot active" id="dotStep2"></div>
        <div class="step-dot" id="dotStep3"></div>
      </div>

      <h2 id="stepTitle">Driver Ambulance Details</h2>
      <p class="subtitle" id="stepSubtitle">Section 2 of 3: Provide your professional details</p>

      <div id="step1Summary" class="form-group-summary" style="margin-top:12px;">
        <!-- filled by script -->
      </div>

      <form id="driverDetailsForm" class="space-y-4" style="margin-top:16px;" enctype="multipart/form-data">
        
        <!-- SECTION 2: AMBULANCE DETAILS -->
        <div id="section2">
          <div class="form-group" style="margin-top:0;">
            <label>Kenyan ID Number</label>
            <input type="text" id="idNumber" class="glass-input" placeholder="e.g. 12345678" maxlength="8">
            <p id="idHint" class="text-xs text-muted mt-1">Must be exactly 8 digits (e.g. 12345678)</p>
          </div>
          <div class="form-group">
            <label>Ambulance Registration (Plate)</label>
            <input type="text" id="ambulancePlate" class="glass-input" placeholder="e.g. KDA001B" maxlength="7" style="text-transform:uppercase;">
            <p id="plateHint" class="text-xs text-muted mt-1">6–7 alphanumeric characters (e.g. KDA001B)</p>
          </div>
          <div class="form-group">
            <label>Ambulance Type</label>
            <select id="ambulanceType" class="glass-select">
              <option value="">Select ambulance type...</option>
              <option value="Basic Life Support (BLS)">Basic Life Support (BLS)</option>
              <option value="Advanced Life Support (ALS)">Advanced Life Support (ALS)</option>
              <option value="Patient Transport Vehicle (PTV)">Patient Transport Vehicle (PTV)</option>
              <option value="Neonatal / Pediatric Ambulance">Neonatal / Pediatric Ambulance</option>
              <option value="Off-road / 4x4 Ambulance">Off-road / 4x4 Ambulance</option>
              <option value="Air Ambulance (Support Vehicle)">Air Ambulance (Support Vehicle)</option>
              <option value="Other">Other (specify below)</option>
            </select>
          </div>
          <div class="form-group" id="ambulanceTypeOtherGroup" style="display:none;">
            <label>Specify Ambulance Type</label>
            <input type="text" id="ambulanceTypeOther" class="glass-input" placeholder="Enter ambulance type">
          </div>

          <div id="errorMsg2" class="alert-inline-error" style="display:none; margin-bottom: 8px;"></div>
          
          <div class="auth-button-group" style="margin-top:24px; display:flex; gap:12px;">
            <button type="button" class="btn-glass-secondary" style="flex:1;" onclick="goBackToBasic()">
              <span class="material-symbols-outlined inline-icon">chevron_left</span> Back
            </button>
            <button type="button" class="btn-glass-emergency" style="flex:1;" onclick="goToSection3()">
              Next <span class="material-symbols-outlined inline-icon">chevron_right</span>
            </button>
          </div>
        </div>

        <!-- SECTION 3: DOCUMENT UPLOADS -->
        <div id="section3" style="display:none;">
          <div class="form-group" style="margin-top:0;">
            <label>Upload a Valid Medical Certificate (PDF/JPG/PNG, Max 20MB)</label>
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="file" id="medicalDocument" class="glass-input" style="flex:1;" accept=".pdf,.jpg,.jpeg,.png">
              <button type="button" onclick="document.getElementById('medicalDocument').value=''" style="background:none; border:none; cursor:pointer; color:var(--destructive); padding:8px;" title="Clear selection">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </div>
            <p class="text-xs text-muted mt-1">A valid KMPDC Authority to Practice Certificate as an Ambulance Operator.</p>
          </div>
          <div class="form-group">
            <label>Upload a Valid Driving License (PDF/JPG/PNG, Max 20MB)</label>
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="file" id="licenseDocument" class="glass-input" style="flex:1;" accept=".pdf,.jpg,.jpeg,.png">
              <button type="button" onclick="document.getElementById('licenseDocument').value=''" style="background:none; border:none; cursor:pointer; color:var(--destructive); padding:8px;" title="Clear selection">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </div>
            <p class="text-xs text-muted mt-1">A scanned copy of your valid NTSA driving license.</p>
          </div>
          
          <div id="errorMsg3" class="alert-inline-error" style="display:none; margin-bottom: 8px;"></div>
          <div class="auth-button-group" style="margin-top:24px; display:flex; gap:12px;">
            <button type="button" class="btn-glass-secondary" style="flex:1;" onclick="goToSection2()">
              <span class="material-symbols-outlined inline-icon">chevron_left</span> Back
            </button>
            <button type="submit" id="btnRegister" class="btn-glass-emergency" style="flex:2;">
              <span class="btn-spinner" style="display:none;"></span>
              <span class="btn-text">Complete Driver Registration</span>
            </button>
          </div>
        </div>

      </form>
    </div>
  </div>

  <style>
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.3s ease; }
    .step-dot.active { background: var(--emergency); box-shadow: 0 0 10px var(--emergency); width: 24px; border-radius: 5px; }
  </style>

  <script>
    window.APP_ROOT = "../";
  </script>
  <script src="../js/data.js"></script>
  <script>
(function () {
      const raw = sessionStorage.getItem('aidfleet_driver_step1');
      if (!raw) {
        window.location.href = '../auth/register.html';
        return;
      }
      const step1 = JSON.parse(raw);
      const summary = document.getElementById('step1Summary');
      summary.innerHTML =
        '<p class="text-xs text-muted" style="text-transform:uppercase;font-weight:500;">Basic Account Info</p>' +
        '<p class="text-sm mt-1"><strong>Name:</strong> ' + escapeHtml(step1.name || '') + '</p>' +
        '<p class="text-sm text-muted"><strong>Email:</strong> ' + escapeHtml(step1.email || '') + '</p>' +
        '<p class="text-sm text-muted"><strong>Phone:</strong> ' + escapeHtml(step1.phone || '') + '</p>';

      // Preload data if present
      const raw2 = sessionStorage.getItem('aidfleet_driver_step2');
      if (raw2) {
        try {
          const s2 = JSON.parse(raw2);
          if (s2.idNumber) document.getElementById('idNumber').value = s2.idNumber;
          if (s2.ambulancePlate) document.getElementById('ambulancePlate').value = s2.ambulancePlate;
          if (s2.ambulanceType) document.getElementById('ambulanceType').value = s2.ambulanceType;
          if (s2.ambulanceType === 'Other' && s2.ambulanceTypeOther) {
            document.getElementById('ambulanceTypeOtherGroup').style.display = 'block';
            document.getElementById('ambulanceTypeOther').value = s2.ambulanceTypeOther;
          }
        } catch (e) {}
      }

      document.getElementById('ambulanceType').addEventListener('change', function () {
        const val = this.value;
        const otherGroup = document.getElementById('ambulanceTypeOtherGroup');
        if (val === 'Other') otherGroup.style.display = 'block';
        else {
          otherGroup.style.display = 'none';
          document.getElementById('ambulanceTypeOther').value = '';
        }
      });

      // Kenyan ID: allow only digits, enforce 8 chars
      document.getElementById('idNumber').addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(0, 8);
        var hint = document.getElementById('idHint');
        var digits = this.value.length;
        if (digits === 8) {
          hint.innerHTML = '<span style="color:var(--success)">✓ Valid ID format</span>';
        } else if (digits > 0) {
          hint.textContent = digits + '/8 digits';
        } else {
          hint.textContent = 'Must be exactly 8 digits (e.g. 12345678)';
        }
      });

      window.goBackToBasic = function () {
        saveSection2();
        window.location.href = '../auth/register.html';
      };

      window.goToSection3 = async function() {
        if (!validateSection2()) return;
        saveSection2();
        
        // Professional transition delay
        const nextBtn = document.querySelector('#section2 button:last-child');
        const origHtml = 'Next <span class="material-symbols-outlined inline-icon">chevron_right</span>';
        nextBtn.disabled = true;
        nextBtn.innerHTML = '<span class="btn-spinner"></span> Validating...';
        await new Promise(r => setTimeout(r, 2700));

        document.getElementById('section2').style.display = 'none';
        document.getElementById('section3').style.display = 'block';
        document.getElementById('dotStep2').classList.remove('active');
        document.getElementById('dotStep3').classList.add('active');
        document.getElementById('stepTitle').textContent = 'Verification Documents';
        document.getElementById('stepSubtitle').textContent = 'Section 3 of 3: Upload required documents';
};

      window.goToSection2 = function() {
        // Reset next button state
        const nextBtn = document.querySelector('#section2 button:last-child');
        nextBtn.disabled = false;
        nextBtn.innerHTML = 'Next <span class="material-symbols-outlined inline-icon">chevron_right</span>';

        document.getElementById('section3').style.display = 'none';
        document.getElementById('section2').style.display = 'block';
        document.getElementById('dotStep3').classList.remove('active');
        document.getElementById('dotStep2').classList.add('active');
        document.getElementById('stepTitle').textContent = 'Driver Ambulance Details';
        document.getElementById('stepSubtitle').textContent = 'Section 2 of 3: Provide your professional details';
};

      function validateSection2() {
        const id = document.getElementById('idNumber').value.trim();
        const plate = document.getElementById('ambulancePlate').value.trim();
        const type = document.getElementById('ambulanceType').value;
        const errEl = document.getElementById('errorMsg2');

        if (id.length !== 8) {
          showInlineError('errorMsg2', 'Kenyan ID Number must be exactly 8 digits'); return false;
        }
        if (!/^[A-Z0-9]{6,7}$/.test(plate.toUpperCase())) {
          showInlineError('errorMsg2', 'Ambulance plate must be 6-7 alphanumeric characters'); return false;
        }
        if (!type) {
          showInlineError('errorMsg2', 'Please select an ambulance type'); return false;
        }
        errEl.style.display = 'none';
        return true;
      }

      function saveSection2() {
        const s2 = {
          idNumber: document.getElementById('idNumber').value.trim(),
          ambulancePlate: document.getElementById('ambulancePlate').value.trim(),
          ambulanceType: document.getElementById('ambulanceType').value,
          ambulanceTypeOther: document.getElementById('ambulanceTypeOther').value.trim(),
        };
        sessionStorage.setItem('aidfleet_driver_step2', JSON.stringify(s2));
      }

      document.getElementById('driverDetailsForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const s2 = JSON.parse(sessionStorage.getItem('aidfleet_driver_step2'));
        const medicalFile = document.getElementById('medicalDocument').files[0];
        const licenseFile = document.getElementById('licenseDocument').files[0];
        const errEl = document.getElementById('errorMsg3');

        if (!medicalFile || !licenseFile) {
          showInlineError('errorMsg3', 'Please upload both required documents');
          return;
        }

        (async () => {
          errEl.style.display = 'none';
          const submitBtn = document.getElementById('btnRegister');
          const btnText = submitBtn.querySelector('.btn-text');
          const spinner = submitBtn.querySelector('.btn-spinner');
          
          submitBtn.disabled = true;
          spinner.style.display = 'inline-block';
          btnText.textContent = 'Processing files...';
          await new Promise(r => setTimeout(r, 2700));

          btnText.textContent = 'Creating driver account...';
          await new Promise(r => setTimeout(r, 2700));

          const driverExtra = { 
            licenseNumber: s2.idNumber, // map ID number to license_number column
            ambulancePlate: s2.ambulancePlate, 
            ambulanceType: s2.ambulanceType === 'Other' ? s2.ambulanceTypeOther : s2.ambulanceType, 
            medicalFile, 
            licenseFile 
          };
          
          const result = await registerUser(step1.name, step1.email, step1.phone, step1.password, 'driver', driverExtra);
          
          if (result.success) {
            btnText.textContent = 'Registration successful!';
            await new Promise(r => setTimeout(r, 3000));
            
            sessionStorage.removeItem('aidfleet_driver_step1');
            sessionStorage.removeItem('aidfleet_driver_step2');
            
            if (result.requires_otp) {
              showOtpModal(result.phone, result.role, function() {
                window.location.href = '../auth/login.html?registered=driver';
              }, 'driver_register');
            } else {
              window.location.href = '../auth/login.html?registered=driver';
            }
          } else {
            showInlineError('errorMsg3', result.message || 'Registration failed');
            submitBtn.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = 'Complete Driver Registration';
          }
        })();
      });
    })();
  </script>
</body>
</html>
