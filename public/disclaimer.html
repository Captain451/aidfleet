<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AidFleet - Disclaimer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .disclaimer-heading {
      margin: 0 0 16px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #dc2626;
      text-transform: uppercase;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      margin: 0 0 24px;
    }
    label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-align: left;
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 20px;
      cursor: pointer;
    }
    input[type="checkbox"] {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      background: #dc2626;
      color: #fff;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="disclaimer-heading">DISCLAIMER</h1>
    <p>This platform is an academic prototype developed for research and educational purposes only. It is not linked to real emergency services and should not be used for actual emergency requests. All data entered is for testing and demonstration purposes only.</p>
    <label>
      <input type="checkbox" id="agreeCheck">
      <span>I understand and agree to continue.</span>
    </label>
    <button type="button" id="continueBtn" disabled>Agree and continue</button>
  </div>
  <script>
    (function () {
      try {
        if (sessionStorage.getItem('aidfleet_disclaimer_accepted') === '1') {
          window.location.replace('index.html');
          return;
        }
      } catch (e) {}

      var check = document.getElementById('agreeCheck');
      var btn = document.getElementById('continueBtn');

      check.addEventListener('change', function () {
        btn.disabled = !check.checked;
      });

      btn.addEventListener('click', function () {
        if (!check.checked) return;
        try {
          sessionStorage.setItem('aidfleet_disclaimer_accepted', '1');
        } catch (e) {}
        window.location.href = 'index.html';
      });
    })();
  </script>
</body>
</html>
