<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AidFleet - Login</title>
  <link rel="stylesheet" href="../css/style.css">
  
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>
  <div class="auth-bg">
    <div class="auth-bg-image" style="background-image:url('../images/hero-bg.jpg');"></div>
    <div class="auth-bg-overlay"></div>
    <!-- Glass card -->
    <div class="glass-card">
      <div class="glass-logo">
        <img src="../images/aidfleet-logo.png" alt="AidFleet" class="glass-logo-img">
        <h1>AidFleet</h1>
      </div>
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to access your dashboard</p>

      <div class="glass-role-selector" style="margin-top:16px;">
        <button class="glass-role-btn active" id="roleReqLogin" onclick="setLoginRole('requester')">Emergency Requester</button>
        <button class="glass-role-btn" id="roleDriverLogin" onclick="setLoginRole('driver')">Ambulance Driver</button>
      </div>
      <form id="loginForm" class="space-y-4" style="margin-top:24px;">
        <div class="form-group" style="margin-top:0;">
          <label>Email</label>
          <input type="email" id="email" class="glass-input" placeholder="name@gmail.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="glass-input" placeholder="Enter your password">
            <button type="button" class="password-toggle" onclick="togglePassword(this, 'password')"><span class="material-symbols-outlined">visibility</span></button>
          </div>
        </div>
        <div id="errorMsg" class="alert-inline-error" style="display:none; margin-bottom: 8px;"></div>
        <div id="successMsg" class="alert-inline-success" style="display:none; margin-bottom: 8px;"><span class="material-symbols-outlined inline-icon">check_circle</span> Account created successfully! Please log in with your credentials.</div>
        <div class="form-group">
          <button type="submit" class="btn-glass-emergency">Sign In</button>
        </div>
        <div class="form-group auth-card-secondary-action">
          <a href="../index.html" class="btn-glass-secondary auth-card-link-button">
            <span class="material-symbols-outlined">home</span>
            <span>Return to Home</span>
          </a>
        </div>
      </form>
      <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
      <p class="auth-link" style="margin-top:4px;">Forgot your password? <a href="forgot-password.html">Reset it</a></p>
    </div>
  </div>
  <script>
    // Initialize routing base
    window.APP_ROOT = "../";
  </script>
  <script src="../js/data.js"></script>
  <script>
let selectedLoginRole = 'requester';
    // Show success message if redirected after registration or account deletion
    (function checkRegistered() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('registered')) {
        document.getElementById('successMsg').style.display = 'block';
        if (params.get('registered') === 'driver') setLoginRole('driver');
        else if (params.get('registered') === 'requester') setLoginRole('requester');
        // Clean the URL
        window.history.replaceState({}, '', 'login.html');
      }
      if (params.get('deleted')) {
        var successEl = document.getElementById('successMsg');
        successEl.innerHTML = '<span class="material-symbols-outlined inline-icon">check_circle</span> Account deleted successfully.';
        successEl.style.display = 'block';
        // Clean the URL
        window.history.replaceState({}, '', 'login.html');
      }
      // Pre-select role if specified
      if (params.get('role') === 'driver') {
        setLoginRole('driver');
        window.history.replaceState({}, '', 'login.html');
      }
    })();
    function setLoginRole(role) {
      selectedLoginRole = role;
      document.getElementById('roleReqLogin').className = 'glass-role-btn' + (role === 'requester' ? ' active' : '');
      document.getElementById('roleDriverLogin').className = 'glass-role-btn' + (role === 'driver' ? ' active' : '');
    }
    // Redirect if already logged in
    (async () => {
      const existing = await getCurrentUser();
      if (existing) {
        if (existing.role === 'admin') window.location.href = window.APP_ROOT + 'admin/dashboard.html';
        else if (existing.role === 'driver') window.location.href = window.APP_ROOT + 'driver/dashboard.html';
        else window.location.href = window.APP_ROOT + 'requester/dashboard.html';
      }
    })();
    function togglePassword(btn, inputId) {
      const p = document.getElementById(inputId);
      const eyeIcon = '<span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;">visibility</span>';
      const eyeOffIcon = '<span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;">visibility_off</span>';
      
      if (p.type === 'password') {
        p.type = 'text';
        btn.innerHTML = eyeOffIcon;
      } else {
        p.type = 'password';
        btn.innerHTML = eyeIcon;
      }
    }
    var loginLockTimer = null;

    function formatAttemptsMessage(remaining) {
      if (typeof remaining !== 'number') return 'Invalid email or password';
      if (remaining <= 0) return 'Invalid email or password. No attempts remaining — please wait for the timer to reset.';
      return 'Invalid email or password. ' + remaining + ' attempt' + (remaining === 1 ? '' : 's') + ' remaining.';
    }

    function setLoginRefreshing(refreshing) {
      var submitBtn = document.querySelector('#loginForm button[type="submit"]');
      if (!submitBtn) return;
      if (refreshing) {
        if (!submitBtn.dataset.origText) submitBtn.dataset.origText = submitBtn.textContent.trim();
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="btn-spinner" style="display:inline-block;border-color:currentColor;border-bottom-color:transparent;"></span> Refreshing...';
      } else {
        submitBtn.disabled = false;
        submitBtn.innerHTML = submitBtn.dataset.origText || 'Sign In';
      }
    }

    function startLoginLockout(lockedUntil) {
      var submitBtn = document.querySelector('#loginForm button[type="submit"]');
      var errEl = document.getElementById('errorMsg');
      if (!submitBtn || !lockedUntil) return;
      setLoginRefreshing(true);
      clearInterval(loginLockTimer);
      var firstTick = true;
      loginLockTimer = setInterval(function() {
        var secondsLeft = Math.max(0, Math.floor(lockedUntil - Date.now() / 1000));
        if (secondsLeft > 0) {
          var lockMsg = 'Too many failed login attempts. Please try again after ' + secondsLeft + ' second' + (secondsLeft === 1 ? '' : 's');
          if (firstTick) {
            showInlineError('errorMsg', lockMsg);
            firstTick = false;
          } else {
            updateInlineError('errorMsg', lockMsg);
          }
        } else {
          clearInterval(loginLockTimer);
          if (errEl) errEl.style.display = 'none';
          setLoginRefreshing(false);
        }
      }, 1000);
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errEl = document.getElementById('errorMsg');
      const submitBtn = document.querySelector('#loginForm button[type="submit"]');
      if (submitBtn && submitBtn.disabled) return;
      if (!email || !password) {
        showInlineError('errorMsg', 'Please fill in all fields');
        return;
      }
      (async () => {
        errEl.style.display = 'none';
        const originalBtnText = submitBtn.innerHTML;
        const originalBtnBg = submitBtn.style.background;
        submitBtn.dataset.origText = originalBtnText;
        
        submitBtn.innerHTML = '<span class="btn-spinner" style="display:inline-block;border-color:currentColor;border-bottom-color:transparent;"></span> Logging in...';
        submitBtn.disabled = true;
        
        const result = await loginUser(email, password);

        // Handle phone verification required
        if (result.phone_unverified) {
          submitBtn.innerHTML = '<span class="btn-spinner" style="display:inline-block;border-color:currentColor;border-bottom-color:transparent;"></span> Redirecting to verification page...';
          await new Promise(r => setTimeout(r, 2000));
          
          submitBtn.innerHTML = originalBtnText;
          submitBtn.disabled = false;
          showOtpModal(result.phone, result.role, function() {
            showInlineError('errorMsg', '');
            errEl.style.display = 'none';
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
          }, 'login');
          return;
        }

        if (result.success) {
          let roleMatch = false;
          if (result.user.role === 'admin') {
            roleMatch = true;
          } else if (result.user.role === 'driver' && selectedLoginRole === 'driver') {
            roleMatch = true;
          } else if (result.user.role === 'requester' && selectedLoginRole === 'requester') {
            roleMatch = true;
          }

          if (roleMatch) {
            submitBtn.innerHTML = '<span class="material-symbols-outlined inline-icon">check_circle</span><span>Login successful, redirecting...</span>';
            submitBtn.style.background = 'var(--success)';
            submitBtn.style.borderColor = 'var(--success)';
            
            await new Promise(r => setTimeout(r, 1500));
            
            if (result.user.role === 'admin') window.location.href = window.APP_ROOT + 'admin/dashboard.html';
            else if (result.user.role === 'driver') window.location.href = window.APP_ROOT + 'driver/dashboard.html';
            else window.location.href = window.APP_ROOT + 'requester/dashboard.html';
          } else {
            // Do not reveal that the email is valid for a different role - for security purposes
            await apiFetch(window.APP_ROOT + 'api/auth/logout.php', { method: 'POST' });
            submitBtn.innerHTML = originalBtnText;
            submitBtn.style.background = originalBtnBg || '';
            submitBtn.disabled = false;
            showInlineError('errorMsg', 'Invalid email or password');
          }
        } else {
          if (result.locked) {
            startLoginLockout(result.locked_until);
          } else {
            submitBtn.innerHTML = originalBtnText;
            submitBtn.disabled = false;
            var failMsg = formatAttemptsMessage(result.attempts_remaining);
            showInlineError('errorMsg', failMsg);
          }
        }
      })();
    });
  </script>
</body>
</html>
