<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AidFleet - Register</title>
  <link rel="stylesheet" href="../css/style.css?v=2">
  
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>
  <div class="auth-bg">
    <div class="auth-bg-image" style="background-image:url('../images/hero-bg.jpg');"></div>
    <div class="auth-bg-overlay"></div>
    <!-- Glass card -->
    <div class="glass-card">
      <div class="glass-logo">
        <img src="../images/aidfleet-logo.png" alt="AidFleet" class="glass-logo-img">
        <h1>AidFleet</h1>
      </div>
      <h2>Create Account</h2>
      <p class="subtitle">Join the AidFleet emergency network</p>

      <div class="glass-role-selector">
        <button class="glass-role-btn active" id="roleReq" onclick="setRole('requester')">Emergency Requester</button>
        <button class="glass-role-btn" id="roleDriver" onclick="setRole('driver')">Ambulance Driver</button>
      </div>
      <form id="registerForm" class="space-y-4" style="margin-top:16px;">
        <div class="form-group" style="margin-top:0;">
          <label>Full Name</label>
          <input type="text" id="name" class="glass-input" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" class="glass-input" placeholder="name@gmail.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="glass-phone-prefix">+254</span>
            <input type="tel" id="phone" class="glass-input" placeholder="7XX XXX XXX" maxlength="9" pattern="[0-9]{9}" style="flex:1;">
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="glass-input" placeholder="Min 6 characters">
            <button type="button" class="password-toggle" onclick="togglePassword(this, 'password')"><span class="material-symbols-outlined">visibility</span></button>
          </div>
          <!-- Password strength indicator -->
          <div class="pw-strength-bar" id="pwStrengthBar">
            <div class="pw-strength-fill" id="pwStrengthFill"></div>
          </div>
          <p class="pw-strength-label" id="pwStrengthLabel"></p>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" class="glass-input" placeholder="Confirm your password">
            <button type="button" class="password-toggle" onclick="togglePassword(this, 'confirmPassword')"><span class="material-symbols-outlined">visibility</span></button>
          </div>
        </div>

        <div id="errorMsg" class="alert-inline-error" style="display:none; margin-bottom: 8px;"></div>
        <div class="form-group">
          <button type="submit" id="btnRegister" class="btn-glass-emergency btn-flex">
            <span class="btn-spinner" style="display:none;"></span>
            <span class="btn-text" id="btnRegisterText">Create Account</span>
            <span class="material-symbols-outlined inline-icon" id="btnRegisterIcon" style="display:none;">chevron_right</span>
          </button>
        </div>
        <div class="form-group auth-card-secondary-action">
          <a href="../index.html" class="btn-glass-secondary auth-card-link-button">
            <span class="material-symbols-outlined">home</span>
            <span>Return to Home</span>
          </a>
        </div>
      </form>
      <p class="auth-link" style="margin-top:16px;">Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>
  <script>window.APP_ROOT = "../";</script>
  <script src="../js/data.js?v=2"></script>
  <script>
let selectedRole = 'requester';
    function setRole(role) {
      selectedRole = role;
      document.getElementById('roleReq').className = 'glass-role-btn' + (role === 'requester' ? ' active' : '');
      document.getElementById('roleDriver').className = 'glass-role-btn' + (role === 'driver' ? ' active' : '');
      
      const btnText = document.getElementById('btnRegisterText');
      const btnIcon = document.getElementById('btnRegisterIcon');
      if (role === 'driver') {
        btnText.textContent = 'Continue to Driver Details';
        btnIcon.style.display = 'inline-block';
      } else {
        btnText.textContent = 'Create Account';
        btnIcon.style.display = 'none';
      }}
    function togglePassword(btn, id) {
      const input = document.getElementById(id);
      if (!input) return;
      const eyeIcon = '<span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;">visibility</span>';
      const eyeOffIcon = '<span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;">visibility_off</span>';
      
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = eyeOffIcon;
      } else {
        input.type = 'password';
        btn.innerHTML = eyeIcon;
      }
    }
    // Password strength meter
    document.addEventListener('DOMContentLoaded', function() {
      var pwInput = document.getElementById('password');
      if (pwInput) {
        pwInput.addEventListener('input', function() {
          var pw = this.value;
          var score = 0;
          if (pw.length >= 6) score++;
          if (pw.length >= 10) score++;
          if (/[A-Z]/.test(pw)) score++;
          if (/[0-9]/.test(pw)) score++;
          if (/[^A-Za-z0-9]/.test(pw)) score++;
          var fill = document.getElementById('pwStrengthFill');
          var label = document.getElementById('pwStrengthLabel');
          var percent = (score / 5) * 100;
          fill.style.width = percent + '%';
          var labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Excellent'];
          var colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#10b981'];
          fill.style.background = colors[score] || '#ef4444';
          label.textContent = labels[score] || '';
          label.style.color = colors[score] || '';
        });
      }
    });
    // Prefill from saved driver step1 if present (to support back-and-forth)
    (function preloadDriverStep1() {
      const raw = sessionStorage.getItem('aidfleet_driver_step1');
      if (!raw) return;
      try {
        const step1 = JSON.parse(raw);
        setRole('driver');
        if (step1.name) document.getElementById('name').value = step1.name;
        if (step1.email) document.getElementById('email').value = step1.email;
        if (step1.phone) {
          const phoneInput = document.getElementById('phone');
          phoneInput.value = step1.phone.startsWith('+254') ? step1.phone.slice(4) : step1.phone;
        }
        if (step1.password) {
          document.getElementById('password').value = step1.password;
          document.getElementById('confirmPassword').value = step1.password;
        }
      } catch (e) {}
    })();
    // Button loading helper
    function setButtonLoading(btnId, loading, loadingText) {
      var btn = document.getElementById(btnId);
      if (!btn) return;
      var text = btn.querySelector('.btn-text');
      var spinner = btn.querySelector('.btn-spinner');
      if (!btn._origText && text) btn._origText = text.textContent;
      if (loading) {
        btn.disabled = true;
        btn.classList.add('btn-loading');
        if (text) text.textContent = loadingText || 'Please wait...';
        if (spinner) spinner.style.display = 'inline-block';
      } else {
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        if (text && btn._origText) text.textContent = btn._origText;
        if (spinner) spinner.style.display = 'none';
      }
    }

    // Phone input: allow only digits, enforce 9 chars
    document.getElementById('phone').addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '').slice(0, 9);
      var hint = document.getElementById('phoneHint');
      var digits = this.value.replace(/\D/g, '').length;
      if (digits === 9) {
        hint.innerHTML = '<span class="material-symbols-outlined inline-icon">check</span> Valid phone number';
        hint.style.color = 'hsl(145,65%,55%)';} else if (digits > 0) {
        hint.textContent = digits + '/9 digits entered';
        hint.style.color = 'hsl(38,92%,60%)';
      } else {
        hint.textContent = 'Must be exactly 9 digits';
        hint.style.color = 'rgba(255,255,255,0.3)';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phoneLocal = document.getElementById('phone').value.trim().replace(/\D/g, '');
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const errEl = document.getElementById('errorMsg');
      if (!name || !email || !phoneLocal || !password) {
        showInlineError('errorMsg', 'All fields are required'); return;
      }
      // Phone: must be exactly 9 digits
      if (phoneLocal.length !== 9) {
        showInlineError('errorMsg', 'Phone number must be exactly 9 digits (e.g. 722735468)'); return;
      }
      if (password.length < 6) {
        showInlineError('errorMsg', 'Password must be at least 6 characters'); return;
      }
      if (password !== confirm) {
        showInlineError('errorMsg', 'Passwords do not match'); return;
      }

      (async () => {
        const errEl = document.getElementById('errorMsg');
        errEl.style.display = 'none';
        setButtonLoading('btnRegister', true, 'Verifying email...');
        await new Promise(r => setTimeout(r, 2700));

        // Step 1: Verify email is real before proceeding
        const emailCheck = await apiFetch('api/auth/verify_email.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });
        if (!emailCheck.success) {
          setButtonLoading('btnRegister', false);
          showInlineError('errorMsg', emailCheck.message || 'Server error during email verification');
          return;
        }
        if (emailCheck.valid === false) {
          setButtonLoading('btnRegister', false);
          showInlineError('errorMsg', emailCheck.reason || 'Please enter a valid, real email address');
          return;
        }
        if (emailCheck.registered === true) {
          setButtonLoading('btnRegister', false);
          showInlineError('errorMsg', 'Email already registered');
          return;
        }

        //  Verify phone is not registered globally
        const phoneCheck = await apiFetch('api/auth/verify_phone.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: phoneLocal })
        });
        if (!phoneCheck.success) {
          setButtonLoading('btnRegister', false);
          showInlineError('errorMsg', phoneCheck.message || 'Server error during phone verification');
          return;
        }
        if (phoneCheck.registered === true) {
          setButtonLoading('btnRegister', false);
          const errEl2 = document.getElementById('errorMsg');
          errEl2.innerHTML = '&#x26A0; This phone number is already registered. <a href="login.html" style="color:#fca5a5;font-weight:700;text-decoration:underline;">Sign in instead &rarr;</a>';
          errEl2.style.display = 'block';
          return;
        }

        // Step 2: Proceed with registration
        setButtonLoading('btnRegister', true, 'Creating account...');
        await new Promise(r => setTimeout(r, 2700));
        const phone = '+254' + (phoneLocal.startsWith('0') ? phoneLocal.slice(1) : phoneLocal);
        if (selectedRole === 'driver') {
          // Save basic details for step 2 (driver details + documents)
          const step1 = { name, email, phone, password };
          sessionStorage.setItem('aidfleet_driver_step1', JSON.stringify(step1));
          setButtonLoading('btnRegister', false);
          window.location.href = '../driver/register-details.html';
          return;
        }
        // Emergency requester registers in a single step
        const result = await registerUser(name, email, phone, password, 'requester');
        setButtonLoading('btnRegister', false);
        if (result.success && result.requires_otp) {
          // Show OTP verification modal
          showOtpModal(result.phone, result.role, function() {
            window.location.href = 'login.html?registered=requester';
          }, 'register');
        } else if (result.success) {
          window.location.href = 'login.html?registered=requester';
        } else {
          showInlineError('errorMsg', result.message || 'Registration failed');
        }
      })();
    });
  </script>
</body>
</html>
